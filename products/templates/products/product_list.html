<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
</head>
<body>
    <h1>Product List</h1>

    <ul>
        {% for object in object_list %}
            <li>
                <a href="{% url 'products:product_detail' object.slug %}">
                    {{ object.name }}
                </a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
